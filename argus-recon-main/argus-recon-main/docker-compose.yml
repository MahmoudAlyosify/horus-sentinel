services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - argus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ARGUS_APP_ENV: development
      ARGUS_DATABASE_URL: postgresql+asyncpg://argus:argus@postgres:5432/argus
      ARGUS_REDIS_URL: redis://redis:6379/0
      ARGUS_ROE_SIGNING_KEY: ${ARGUS_ROE_SIGNING_KEY:-dev-only-insecure-signing-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

volumes:
  argus_postgres_data:

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HORUS Sentinel — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E10;--bg2:#12161B;--panel:#12161B;--panel2:#12161B;--elevated:#1A1F26;
    --surface-hover:#20262F;--input-bg:#0F1318;
    --ink:#E6E1D5;--muted:#A7A39A;--faint:#7D8187;--line:#2B3138;
    --gold:#D4AF37;--gold-light:#E4C158;--gold2:#B8860B;--bronze:#8C6A3D;
    --success:#2ECC71;--success-hover:#27AE60;
    --warn:#F4B942;--danger:#E74C3C;
    --crit:#E74C3C;--crit-bg:#3A1818;--high:#E74C3C;--high-bg:#3A1818;
    --med:#F4B942;--med-bg:#3B3116;--low:#7FAF7F;--low-bg:#223126;
    --info:#A7A39A;--info-bg:#1A1F26;
    --accent:var(--gold);--accent2:var(--gold2);
    --font-ui:"IBM Plex Sans","IBM Plex Sans Arabic",sans-serif;
    --font-display:"Cinzel","IBM Plex Sans",serif;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);font-family:var(--font-ui);min-height:100vh;
       letter-spacing:.01em;
       background-color:var(--bg);
       background-image:
         linear-gradient(180deg,rgba(11,14,16,.72) 0%,rgba(11,14,16,.55) 40%,rgba(11,14,16,.78) 100%),
         url("horus-bg.png");
       background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed}
  header{position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line);
         background:rgba(18,22,27,.72);backdrop-filter:blur(8px)}
  header>*{position:relative;z-index:1}
  header .logo{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:.08em;color:var(--ink);text-transform:uppercase}
  header .logo svg{flex:none}
  header .logo small{color:var(--muted);font-family:var(--font-ui);font-weight:400;font-size:11px;display:block;letter-spacing:.04em;text-transform:none}
  html[dir=rtl] .modes{margin-right:auto}
  html[dir=ltr] .modes{margin-left:auto}
  .modes{display:flex;gap:8px;align-items:center}
  .mode,.langbtn{padding:8px 16px;border:1px solid var(--line);border-radius:8px;background:var(--bg2);
        color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;transition:border-color .15s ease,color .15s ease,background-color .15s ease}
  .mode:hover{color:var(--ink);background:var(--surface-hover)}
  .mode.active{color:var(--gold);background:rgba(212,175,55,.08);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .langbtn{font-weight:700}
  .brainchip{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:20px;
             padding:5px 11px;background:var(--bg2);cursor:pointer;white-space:nowrap}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 5px;background:var(--faint)}
  .dot.on{background:var(--success)} .dot.warn{background:var(--warn)}
  main{display:grid;grid-template-columns:360px 1fr;gap:18px;padding:18px 26px;max-width:1500px;margin:0 auto}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  .card{background:rgba(18,22,27,.82);border:1px solid var(--line);border-radius:10px;padding:18px;
        box-shadow:0 0 20px rgba(212,175,55,.08);backdrop-filter:blur(6px)}
  .card h3{margin:0 0 12px;font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink);letter-spacing:.06em;text-transform:uppercase}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;letter-spacing:.03em}
  input,select{width:100%;padding:9px 11px;background:var(--input-bg);border:1px solid var(--line);
        border-radius:8px;color:var(--ink);font-size:14px;font-family:inherit;transition:border-color .15s ease}
  input::placeholder{color:var(--faint)}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 1px rgba(212,175,55,.3)}
  button.btn{width:100%;margin-top:14px;padding:11px;border:0;border-radius:8px;font-weight:600;
        cursor:pointer;font-size:14px;font-family:inherit;letter-spacing:.03em;transition:background-color .15s ease,filter .15s ease,transform .15s ease,box-shadow .15s ease}
  .btn.primary{background:var(--success);color:#fff}
  .btn.primary:hover{background:var(--success-hover)}
  .btn.run{
    position:relative;display:flex;align-items:center;justify-content:center;
    width:100%;margin-top:14px;aspect-ratio:963 / 203;min-height:0;padding:0 12%;
    border:0;border-radius:0;background:transparent;cursor:pointer;overflow:visible;
    color:#F2E6C4;font-family:var(--font-display),var(--font-ui);font-size:15px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.95),0 0 12px rgba(0,0,0,.7);
    box-shadow:none;transition:filter .15s ease,transform .15s ease
  }
  .btn.run img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    pointer-events:none;z-index:0
  }
  .btn.run .run-label{position:relative;z-index:1;pointer-events:none;line-height:1.2;text-align:center}
  html[dir=rtl] .btn.run{letter-spacing:.04em;text-transform:none;font-size:13px;padding:0 10%}
  .btn.run:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .btn.run:active{transform:translateY(0);filter:brightness(1.04)}
  .btn.run:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .btn.roe{
    position:relative;display:flex;align-items:center;justify-content:center;
    width:100%;margin-top:14px;aspect-ratio:889 / 174;min-height:0;padding:0 12%;
    border:0;border-radius:0;background:transparent;cursor:pointer;overflow:visible;
    color:var(--gold-light);font-family:var(--font-display),var(--font-ui);font-size:15px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.95),0 0 12px rgba(0,0,0,.7);
    box-shadow:none;transition:filter .15s ease,transform .15s ease
  }
  .btn.roe img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    pointer-events:none;z-index:0
  }
  .btn.roe .roe-label{position:relative;z-index:1;pointer-events:none;line-height:1.2;text-align:center}
  html[dir=rtl] .btn.roe{letter-spacing:.04em;text-transform:none;font-size:13px;padding:0 10%}
  .btn.roe:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .btn.roe:active{transform:translateY(0);filter:brightness(1.04)}
  .btn.roe:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .btn.ghost{background:var(--bg2);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--surface-hover)}
  .btn.demo{background:var(--warn);color:#111111}
  .btn.demo:hover{filter:brightness(1.08)}
  .btn.pdf{background:var(--gold);color:#111111;margin-top:10px}
  .btn.pdf:hover{background:var(--gold-light)}
  .hint{font-size:11px;color:var(--faint);margin-top:6px}
  .status{margin-top:12px;font-size:13px;color:var(--gold);min-height:18px}
  .active-box{margin-top:12px;padding:10px 12px;border:1px solid var(--warn);border-radius:9px;
              background:rgba(244,185,66,.07)}
  .active-box label{color:var(--ink);display:flex;align-items:center;gap:8px;margin:0;font-size:13px;cursor:pointer}
  .active-box input[type=checkbox]{width:auto;margin:0}
  .active-warn{font-size:11px;color:var(--warn);margin-top:7px;line-height:1.5}
  .metrics{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 12px}
  .metric{background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:10px 14px;flex:1;min-width:90px}
  .metric .v{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--ink);letter-spacing:.04em}
  .metric .l{font-size:11px;color:var(--muted)}
  .band{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.01em}
  .band.Critical{background:var(--crit-bg);color:#FF7A6B;border:1px solid rgba(231,76,60,.35)}
  .band.High{background:var(--high-bg);color:var(--high)}
  .band.Medium{background:var(--med-bg);color:var(--med)}
  .band.Low{background:var(--low-bg);color:var(--low)}
  .band.Info{background:var(--info-bg);color:var(--info);border:1px solid var(--line)}
  #graph{height:420px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-top:8px;direction:ltr}
  html[dir=rtl] .finding{border-right:3px solid var(--line);border-radius:8px 0 0 8px}
  html[dir=ltr] .finding{border-left:3px solid var(--line);border-radius:0 8px 8px 0}
  .finding{padding:8px 12px;margin:8px 0;background:var(--elevated);font-size:13px}
  .finding.Critical{border-color:var(--crit)}.finding.High{border-color:var(--high)}
  .finding.Medium{border-color:var(--med)}.finding.Low{border-color:var(--low)}
  .prose{white-space:pre-wrap;font-size:13px;color:var(--ink);line-height:1.7}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  th,td{padding:6px 8px;border-bottom:1px solid var(--line)}
  html[dir=rtl] th,html[dir=rtl] td{text-align:right}
  html[dir=ltr] th,html[dir=ltr] td{text-align:left}
  th{color:var(--muted);font-weight:600}
  code{color:var(--gold2);direction:ltr;unicode-bidi:embed;display:inline-block}
  .muted{color:var(--muted)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid var(--line)}
  .tab{padding:6px 4px;margin-bottom:-1px;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;transition:color .15s ease,border-color .15s ease}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--gold);border-color:var(--gold);font-weight:600}
  .hidden{display:none!important}
  .chat{height:360px;overflow:auto;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13px}
  .bubble{margin:8px 0;padding:10px 12px;border-radius:10px;max-width:85%}
  html[dir=rtl] .bubble.user{margin-right:auto}html[dir=ltr] .bubble.user{margin-left:auto}
  .bubble.user{background:var(--surface-hover)}.bubble.horus{background:var(--elevated);border:1px solid var(--line)}
  .bubble .answer{white-space:pre-wrap}
  .bubble .note{margin-top:8px;font-size:10px;color:var(--muted);border-top:1px dashed var(--line);padding-top:6px}
  .bubble.thinking{opacity:.7;font-style:italic}
  .overlay{position:fixed;inset:0;background:rgba(11,14,16,.82);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:rgba(26,31,38,.95);border:1px solid var(--line);border-radius:14px;padding:24px;width:min(520px,92vw);box-shadow:0 20px 48px rgba(0,0,0,.45);backdrop-filter:blur(8px)}
  .modal h2{margin:0 0 6px;font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:.06em}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.6}
  .modal .err{color:var(--danger);font-size:12px;min-height:16px;margin-top:8px}
  .modal .actions{display:flex;gap:10px;margin-top:16px}
  .modal a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2 12c3-4 7-6 10-6s7 2 10 6c-3 4-7 6-10 6s-7-2-10-6z"/>
      <circle cx="12" cy="12" r="2.1"/>
      <path d="M12 14.3v3.2"/>
      <path d="M9.6 17l-1.1 2.3"/>
      <path d="M3.2 9.6c1.5-1 2.9-1.6 3.8-1.9"/>
    </svg>
    <span>HORUS SENTINEL <small data-i18n="app_sub"></small></span>
  </div>
  <div class="modes">
    <div class="langbtn" id="langBtn" onclick="toggleLang()">EN</div>
    <div class="brainchip" id="brainChip" onclick="openSetup()"><span class="dot" id="brainDot"></span><span id="brainLabel"></span></div>
    <div class="mode active" data-mode="recon" data-i18n="mode_recon" onclick="switchMode('recon')"></div>
    <div class="mode" data-mode="geo" data-i18n="mode_geo" onclick="switchMode('geo')"></div>
  </div>
</header>

<main>
  <div class="card" id="panel-left">
    <div id="recon-controls">
      <h3 data-i18n="new_assessment"></h3>
      <label data-i18n="subject_type"></label>
      <select id="subjType" onchange="onTypeChange()">
        <option value="domain" data-i18n="opt_domain"></option>
        <option value="region" data-i18n="opt_region"></option>
      </select>
      <label data-i18n="subject_label"></label>
      <input id="subjValue" value="example.com">
      <div id="regionFields" class="row hidden">
        <div><label data-i18n="year_from"></label><input id="yearFrom" value="2018"></div>
        <div><label data-i18n="year_to"></label><input id="yearTo" value="2019"></div>
      </div>
      <label data-i18n="analyst_label"></label>
      <input id="analyst" value="analyst_mahmoud">

      <div class="active-box" id="activeBox">
        <label><input type="checkbox" id="activeToggle" onchange="onActiveToggle()"> <span data-i18n="active_toggle"></span></label>
        <div class="active-warn" data-i18n="active_warn"></div>
      </div>

      <button type="button" class="btn roe" id="roeBtn" onclick="genRoE()">
        <img src="roe-btn-bg.png" alt="" width="889" height="174" decoding="async">
        <span class="roe-label" data-i18n="gen_roe"></span>
      </button>
      <button type="button" class="btn run" id="runBtn" onclick="runAssessment()">
        <img src="run-btn-bg.png" alt="" width="963" height="203" decoding="async">
        <span class="run-label" data-i18n="run_assessment"></span>
      </button>
      <div class="status" id="status"></div>
      <hr style="border-color:var(--line);margin:16px 0">
      <button class="btn demo" onclick="guidedDemo()" data-i18n="guided_demo"></button>
      <div class="hint" data-i18n="demo_hint"></div>
    </div>
  </div>

  <div class="card" id="panel-right">
    <div id="recon-view">
      <div class="tabs">
        <div class="tab active" data-tab="report" data-i18n="tab_report" onclick="switchTab('report')"></div>
        <div class="tab" data-tab="graph" data-i18n="tab_graph" onclick="switchTab('graph')"></div>
        <div class="tab" data-tab="custody" data-i18n="tab_custody" onclick="switchTab('custody')"></div>
      </div>
      <div id="tab-report">
        <div id="empty" class="muted" data-i18n="empty_report"></div>
        <div id="report" class="hidden"></div>
      </div>
      <div id="tab-graph" class="hidden">
        <div class="muted" id="graphMeta"></div>
        <div id="graph"></div>
      </div>
      <div id="tab-custody" class="hidden">
        <div class="muted" id="custodyMeta"></div>
        <table id="custodyTable"></table>
      </div>
    </div>
    <div id="geo-view" class="hidden">
      <h3 data-i18n="geo_title"></h3>
      <div class="chat" id="chat"><div class="bubble horus" data-i18n="geo_greeting"></div></div>
      <div class="row" style="margin-top:10px">
        <input id="geoInput">
        <button class="btn primary" style="max-width:120px;margin:0" onclick="geoAsk()" data-i18n="geo_send"></button>
      </div>
      <div class="hint" data-i18n="geo_hint"></div>
    </div>
  </div>
</main>

<div class="overlay hidden" id="setupOverlay">
  <div class="modal">
    <h2 data-i18n="setup_title"></h2>
    <div class="sub" data-i18n="setup_sub"></div>
    <label data-i18n="setup_token_label"></label>
    <input id="hfToken" type="password" placeholder="hf_xxxxxxxxxxxx" autocomplete="off">
    <label data-i18n="setup_backend_label"></label>
    <select id="hfBackend">
      <option value="hybrid" data-i18n="be_hybrid"></option>
      <option value="hf_serverless" data-i18n="be_serverless"></option>
      <option value="hf_endpoint" data-i18n="be_endpoint"></option>
      <option value="ollama" data-i18n="be_ollama"></option>
    </select>
    <label data-i18n="setup_endpoint_label"></label>
    <input id="hfEndpoint" placeholder="https://xxxx.endpoints.huggingface.cloud">
    <div class="err" id="setupErr"></div>
    <div class="actions">
      <button class="btn primary" onclick="saveSetup()" data-i18n="setup_save"></button>
      <button class="btn ghost" onclick="closeSetup()" data-i18n="setup_later"></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>

function t(k){return (T[LANG]&&T[LANG][k])||k;}
function applyLang(lang){
  LANG=lang;
  document.documentElement.lang=lang;
  document.documentElement.dir=(lang==="ar")?"rtl":"ltr";
  document.getElementById("langBtn").textContent=(lang==="ar")?"EN":"ع";
  document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.dataset.i18n);});
  const roeBtn=document.getElementById("roeBtn");
  if(roeBtn){
    roeBtn.setAttribute("aria-label",t("gen_roe"));
  }
  const runBtn=document.getElementById("runBtn");
  if(runBtn){
    runBtn.setAttribute("aria-label",t("run_assessment"));
  }
  document.getElementById("geoInput").placeholder=(lang==="ar")?"اكتب سؤالك لحورس…":"Ask HORUS a question…";
  refreshBrain();
}
async function toggleLang(){
  const next=(LANG==="ar")?"en":"ar";
  applyLang(next);
  try{ await fetch(API+"/setup/language",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({language:next})}); }catch(e){}
}

function switchMode(m){
  document.querySelectorAll('.mode').forEach(e=>e.classList.toggle('active', e.dataset.mode===m));
  document.getElementById('recon-view').classList.toggle('hidden', m!=='recon');
  document.getElementById('geo-view').classList.toggle('hidden', m!=='geo');
  document.getElementById('panel-left').classList.toggle('hidden', m!=='recon');
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active', e.dataset.tab===tab));
  document.getElementById('tab-report').classList.toggle('hidden', tab!=='report');
  document.getElementById('tab-graph').classList.toggle('hidden', tab!=='graph');
  document.getElementById('tab-custody').classList.toggle('hidden', tab!=='custody');
  if(tab==='graph' && lastGraph) renderGraph(lastGraph);
}
function onTypeChange(){
  const ty=document.getElementById('subjType').value;
  document.getElementById('regionFields').classList.toggle('hidden', ty!=='region');
  document.getElementById('subjValue').value = ty==='region' ? 'Sinai' : 'example.com';
  // active recon only makes sense for domains
  document.getElementById('activeBox').style.display = ty==='domain' ? '' : 'none';
  if(ty!=='domain') document.getElementById('activeToggle').checked=false;
}
function onActiveToggle(){ currentRoE=null; setStatus(''); }
function setStatus(s){ document.getElementById('status').textContent=s; }

function subjectPayload(){
  const type=document.getElementById('subjType').value;
  const value=document.getElementById('subjValue').value.trim();
  const s={type,value};
  if(type==='region'){ s.year_from=+document.getElementById('yearFrom').value; s.year_to=+document.getElementById('yearTo').value; }
  return s;
}
function genRoE(){
  const type=document.getElementById('subjType').value;
  const value=document.getElementById('subjValue').value.trim();
  const active = type==='domain' && document.getElementById('activeToggle').checked;
  let sources = type==='region' ? ['geo_events','threat_intel'] : ['public_records','web_infra','threat_intel'];
  if(active) sources = sources.concat(['active_recon','web_crawl']);
  const exp=new Date(Date.now()+3600e3).toISOString();
  currentRoE={subject:value,enabled_sources:sources,in_scope_domains:type==='domain'?[value]:[],
              active_authorized:active,signed_by:document.getElementById('analyst').value,expires_at:exp};
  setStatus((LANG==="ar"?"✓ تم توليد التفويض — المصادر: ":"✓ RoE generated — sources: ")+sources.join('، ')+(active?(LANG==="ar"?" (فعّال)":" (active)"):""));
}
async function runAssessment(){
  if(!currentRoE) genRoE();
  setStatus(LANG==="ar"?"جارٍ إنشاء المهمة…":"Creating job…");
  try{
    const cr=await fetch(API+'/jobs',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subject:subjectPayload(),roe:currentRoE})});
    if(cr.status===403){ setStatus('⛔ '+(LANG==="ar"?"رُفض من بوابة التفويض: ":"Refused by authorization gate: ")+(await cr.json()).detail); return; }
    if(!cr.ok){ setStatus('Error: '+(await cr.text())); return; }
    const {id}=await cr.json();
    setStatus((LANG==="ar"?"جارٍ الجمع والاستدلال (المهمة ":"Running collection + reasoning (job ")+id.slice(0,8)+")…");
    const rr=await fetch(API+'/jobs/'+id+'/run',{method:'POST'});
    const rs=await rr.json();
    setStatus(LANG==="ar"?"جارٍ التحقق والاعتماد…":"Validating…");
    await fetch(API+'/jobs/'+id+'/validate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'validate',analyst:currentRoE.signed_by,note:'Validated via Command Center'})});
    await loadReport(id);
    setStatus('✓ '+(LANG==="ar"?"اكتمل — ":"Done — ")+rs.entity_count+(LANG==="ar"?" كيان · ":" entities · ")+rs.agents_run.join('/'));
  }catch(e){ setStatus('Error: '+e.message); }
}
async function guidedDemo(){
  setStatus(LANG==="ar"?"جارٍ تشغيل العرض الإرشادي…":"Running Guided Demo…");
  try{
    const r=await fetch(API+'/demo',{method:'POST'}); const d=await r.json();
    await loadReport(d.job_id);
    setStatus('✓ '+(LANG==="ar"?"اكتمل — ":"Done — ")+d.subject+", "+d.entity_count+(LANG==="ar"?" كيان":" entities"));
  }catch(e){ setStatus('Error: '+e.message); }
}
async function loadReport(jobId){
  lastJobId=jobId;
  const r=await fetch(API+'/jobs/'+jobId+'/report');
  if(!r.ok){ setStatus(LANG==="ar"?"التقرير غير جاهز":"Report not ready"); return; }
  const {report_card:card,graph}=await r.json();
  lastGraph=graph; renderReport(card);
  renderCustody(await (await fetch(API+'/jobs/'+jobId)).json());
  if(!document.getElementById('tab-graph').classList.contains('hidden')) renderGraph(graph);
}
function bandTag(b){ return `<span class="band ${b}">${(BAND[LANG][b]||b)}</span>`; }
function renderReport(card){
  document.getElementById('empty').classList.add('hidden');
  const el=document.getElementById('report'); el.classList.remove('hidden');
  const f=(card.prioritized_findings||[]).map(p=>`
    <div class="finding ${p.risk_band}"><b>${p.title}</b> ${bandTag(p.risk_band)}
    <span class="muted">(${p.risk_score.toFixed(1)})</span><br><span class="muted">${p.why_it_matters}</span><br>
    ${p.framework?`${t('framework')}: <code>${p.framework.technique_id}</code> ${p.framework.technique_name}<br>`:''}
    ${t('recommendation')}: ${p.recommendation}</div>`).join('');
  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="v">${card.entity_count}</div><div class="l">${t('entities')}</div></div>
      <div class="metric"><div class="v">${bandTag(card.top_band)}</div><div class="l">${t('top_band')}</div></div>
      <div class="metric"><div class="v">${card.critical_cve_hits}</div><div class="l">${t('critical_cves')}</div></div>
      <div class="metric"><div class="v">${(card.prioritized_findings||[]).length}</div><div class="l">${t('findings')}</div></div>
    </div>
    <button class="btn pdf" onclick="downloadPdf()">${t('download_pdf')}</button>
    <h3>${t('exec_summary')}</h3><p class="prose">${card.executive_summary||''}</p>
    <p class="muted">${t('reasoning_by')} <code>${card.generated_by}</code></p>
    <h3>${t('geopolitical')}</h3><p class="prose">${card.geopolitical_context||''}</p>
    <h3>${t('threat_assessment')}</h3><p class="prose">${card.threat_assessment||''}</p>
    <h3>${t('prioritized')}</h3>${f||('<p class="muted">'+t('none')+'</p>')}`;
}
function downloadPdf(){ if(lastJobId) window.open(API+'/jobs/'+lastJobId+'/download/pdf','_blank'); }
function renderCustody(job){
  document.getElementById('custodyMeta').textContent =
    (LANG==="ar"?"المهمة ":"Job ")+job.id.slice(0,8)+" · "+job.status+" · "+job.audit_count+(LANG==="ar"?" اتصال مُدقَّق":" audited touches")+
    (job.validated_by?(" · "+(LANG==="ar"?"تحقّق منه ":"validated by ")+job.validated_by):"");
}
function renderGraph(graph){
  document.getElementById('graphMeta').textContent=(graph.nodes||[]).length+(LANG==="ar"?" عقدة · ":" nodes · ")+(graph.edges||[]).length+(LANG==="ar"?" علاقة":" edges");
  if(!window.cytoscape){ document.getElementById('graph').innerHTML='<p class="muted" style="padding:16px">Cytoscape offline.</p>'; return; }
  cy=cytoscape({container:document.getElementById('graph'),elements:{nodes:graph.nodes||[],edges:graph.edges||[]},
    style:[{selector:'node',style:{'background-color':'data(color)','label':'data(label)','color':'#E6E1D5','font-size':'8px','width':16,'height':16}},
           {selector:'edge',style:{'width':1,'line-color':'#2B3138','label':'data(label)','font-size':'6px','color':'#A7A39A','target-arrow-shape':'triangle','target-arrow-color':'#2B3138','curve-style':'bezier'}}],
    layout:{name:'cose',animate:false}});
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const chatHistory=[];
async function geoAsk(){
  const inp=document.getElementById('geoInput'); const q=inp.value.trim(); if(!q) return;
  const chat=document.getElementById('chat');
  chat.innerHTML+=`<div class="bubble user">${escapeHtml(q)}</div>`; inp.value='';
  const thinking=document.createElement('div');
  thinking.className='bubble horus thinking'; thinking.textContent=t('geo_thinking');
  chat.appendChild(thinking); chat.scrollTop=chat.scrollHeight;
  try{
    const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,language:LANG})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    thinking.remove();
    const idx=chatHistory.push({q:q,a:d.answer,by:d.generated_by||''})-1;
    chat.innerHTML+=`<div class="bubble horus"><div class="answer">${escapeHtml(d.answer)}</div>`+
      `<div class="note">${t('geo_note')} · <code>${escapeHtml(d.generated_by||'')}</code>`+
      ` · <a href="#" onclick="downloadChat(${idx});return false;">${t('geo_download')}</a></div></div>`;
  }catch(e){
    thinking.remove();
    chat.innerHTML+=`<div class="bubble horus">${t('geo_error')}</div>`;
  }
  chat.scrollTop=chat.scrollHeight;
}

async function downloadChat(i){
  const item=chatHistory[i]; if(!item) return;
  try{
    const r=await fetch(API+'/chat/report',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:item.q,answer:item.a,generated_by:item.by,language:LANG,fmt:'pdf'})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='horus-chat-report.pdf';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){ alert(t('geo_error')); }
}

async function refreshBrain(){
  try{
    const s=await (await fetch(API+'/setup/status')).json();
    const dot=document.getElementById('brainDot'), lbl=document.getElementById('brainLabel');
    if(s.online_ready){ lbl.textContent=t('brain_online')+' ('+(s.hf_username||'HF')+')'; dot.className='dot on'; }
    else if(s.ollama_ready){ lbl.textContent=t('brain_local'); dot.className='dot on'; }
    else { lbl.textContent=t('brain_offline'); dot.className='dot warn'; }
    return s;
  }catch(e){ return null; }
}
function openSetup(){ document.getElementById('setupOverlay').classList.remove('hidden'); }
function closeSetup(){ document.getElementById('setupOverlay').classList.add('hidden'); }
async function saveSetup(){
  const err=document.getElementById('setupErr'); err.textContent='';
  const token=document.getElementById('hfToken').value.trim();
  const backend=document.getElementById('hfBackend').value;
  const endpoint=document.getElementById('hfEndpoint').value.trim();
  if(backend!=='ollama' && !token){ err.textContent=(LANG==="ar"?"أدخل رمز Hugging Face أو اختر «Ollama محلي».":"Enter a token or pick Local Ollama."); return; }
  err.textContent=(LANG==="ar"?"جارٍ الحفظ…":"Saving…");
  try{
    const body = backend==='ollama' ? {token:'',backend:'ollama'} : {token,backend,endpoint_url:endpoint||null};
    const r=await fetch(API+'/setup/hf-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){ err.textContent='✗ '+((await r.json()).detail||'failed'); return; }
    err.textContent='✓'; await refreshBrain(); setTimeout(closeSetup,600);
  }catch(e){ err.textContent='Error: '+e.message; }
}

(async function init(){
  const s=await refreshBrain();
  applyLang(s && s.report_language==="en" ? "en" : "ar");
  onTypeChange();
  if(s && !s.configured) openSetup();
})();
</script>

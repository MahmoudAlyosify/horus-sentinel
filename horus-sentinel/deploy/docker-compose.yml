# HORUS SENTINEL — local development stack
# Usage:  docker compose -f deploy/docker-compose.yml up -d
#   The `api` service serves the API + Command Center (/ui) wired to every datastore.
# Pinned project name -> deterministic container names (horus-sentinel-<service>-1) on any OS.
name: horus-sentinel
services:

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_started
      chroma:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-horus}:${POSTGRES_PASSWORD:-horus_dev_pw}@postgres:5432/${POSTGRES_DB:-horus_sentinel}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-horus_dev_pw}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://ollama:11434}
      HORUS_MODEL_NAME: ${HORUS_MODEL_NAME:-horus-osint}
      GEO_CORPUS_PATH: /app/data/geo_corpus.json
      QUEUE_BACKEND: redis
      RAG_BACKEND: ${RAG_BACKEND:-keyword}
    ports: ["8000:8000"]
    volumes:
      - ../data:/app/data          # drop the real geo corpus + reports here
    restart: unless-stopped

  # Async worker(s): pull queued jobs and run the pipeline (resumable). Scale with --scale worker=N.
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "workflows.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-horus}:${POSTGRES_PASSWORD:-horus_dev_pw}@postgres:5432/${POSTGRES_DB:-horus_sentinel}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-horus_dev_pw}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://ollama:11434}
      HORUS_MODEL_NAME: ${HORUS_MODEL_NAME:-horus-osint}
      GEO_CORPUS_PATH: /app/data/geo_corpus.json
      QUEUE_BACKEND: redis
      RAG_BACKEND: ${RAG_BACKEND:-keyword}
    volumes:
      - ../data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horus_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-horus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horus_dev_pw}
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-horus_dev_pw}
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]   # 7474 = browser UI, 7687 = bolt
    volumes: ["neo4j_data:/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  chroma:
    image: chromadb/chroma:0.5.5
    ports: ["8001:8000"]
    volumes: ["chroma_data:/chroma/chroma"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_dev_pw}
    ports: ["9000:9000", "9001:9001"]   # 9000 = API, 9001 = console
    volumes: ["minio_data:/data"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    # After first `up`, load your fine-tuned model (service-based, works on any OS):
    #   docker compose -f deploy/docker-compose.yml exec ollama ollama pull hf.co/mahmoudalyosify/Horus-OSINT
    # Windows GPU tip: it is often easiest to run the native Ollama app (RTX GPU, no WSL
    # passthrough), then set OLLAMA_ENDPOINT=http://host.docker.internal:11434 in .env.

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  chroma_data:
  minio_data:
  ollama_data:
